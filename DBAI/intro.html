<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Intro</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="content">
    <div class="wrap">
        <p class="eyebrow">Database Practice</p>
        <h1 class="page-title">examtable <span class="mark">실습</span></h1>
        <p class="lead">
            <strong>DBAI</strong>는 JSP와 MySQL로 데이터베이스 테이블을
            생성하고, 데이터를 입력하며, 조회하는 과정을 실습하는 예제입니다.
            왼쪽 메뉴에서 단계를 차례대로 눌러 진행하세요.
        </p>

        <div class="intro-card">
            <h2>examtable 구조</h2>
            <div class="schema">
                <div class="col">      <span class="k">name</span>     <span class="v">이름</span></div>
                <div class="col pk">   <span class="k">studentid</span><span class="v">학번 · PK</span></div>
                <div class="col">      <span class="k">kor</span>      <span class="v">국어</span></div>
                <div class="col">      <span class="k">eng</span>      <span class="v">영어</span></div>
                <div class="col">      <span class="k">mat</span>      <span class="v">수학</span></div>
            </div>
        </div>

        <p class="hint">
            <span class="arrow">←</span>
            <span><strong>01 TBL 생성</strong> 부터 시작해 보세요. 전체조회에서 이름을 누르면 개별 성적이 보입니다.</span>
        </p>
    </div>
</body>
</html>
